site_name: "bt_api_okx Documentation"
site_description: "OKX exchange plugin for bt_api - Spot, Futures, Swap, Options and more"
site_author: cloudQuant
site_url: https://bt-api-okx.readthedocs.io/

repo_name: cloudQuant/bt_api_okx
repo_url: https://github.com/cloudQuant/bt_api_okx

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  plugins:
    - search
    - materialx
    - i18n:
        docs_structure: suffix
        fallback_to_default: true
        reconfigure_material: true
        reconfigure_search: true
        languages:
          en:
            name: English
            build: true
          zh:
            name: 中文
            build: true

nav:
  - Home: index.md
  - API Reference:
    - Gateway: api/gateway.md
    - Feeds: api/feeds.md
    - Containers: api/containers.md
    - Exchange Data: api/exchange_data.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
  - toc:
      permalink: true
